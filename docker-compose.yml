services:
  # Override entrypoint so anvil runs directly with --host 0.0.0.0 (required for host access)
  chain-a:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: chain-a
    entrypoint: ["/usr/local/bin/anvil"]
    command: ["--host", "0.0.0.0", "--port", "8545", "--block-time", "1"]
    ports:
      - "8545:8545"

  chain-b:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: chain-b
    entrypoint: ["/usr/local/bin/anvil"]
    command: ["--host", "0.0.0.0", "--port", "8545", "--block-time", "1"]
    ports:
      - "8547:8545"

  relayer:
    build: ./relayer
    container_name: relayer
    depends_on:
      - chain-a
      - chain-b
    volumes:
      - ./relayer/config.json:/app/config.json:ro
      - ./relayer/attestations:/app/attestations
    environment:
      - CHAIN_A_RPC=http://chain-a:8545
      - CHAIN_B_RPC=http://chain-b:8545
      - ATTESTATIONS_DIR=/app/attestations
    restart: unless-stopped
